name: tauri-dev-linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "Tools/WebServer/**"
      - "Tools/TauriShell/**"
      - "LaunchGUI.sh"
      - ".github/workflows/tauri-dev-linux.yml"

permissions:
  contents: write

concurrency:
  group: tauri-dev-linux-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build-dev-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            Tools/WebServer/package-lock.json
            Tools/TauriShell/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./Tools/TauriShell/src-tauri -> target

      - name: Build Web assets
        working-directory: Tools/WebServer
        run: |
          npm ci
          npm run build

      - name: Install Tauri shell dependencies
        working-directory: Tools/TauriShell
        run: npm ci

      - name: Build and publish Linux GUI to dev pre-release
        uses: tauri-apps/tauri-action@v0.6.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: Tools/TauriShell
          tagName: dev-build
          releaseName: "AiNiee Dev Preview (Web + GUI)"
          releaseCommitish: ${{ github.sha }}
          releaseBody: |
            Auto-generated Linux development preview build.
            Commit: ${{ github.sha }}
            Ref: ${{ github.ref_name }}
            Message: ${{ github.event.head_commit.message || 'manual dispatch' }}
          releaseDraft: false
          prerelease: true

  upload-dev-launchers:
    runs-on: ubuntu-latest
    needs: build-dev-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload launcher scripts to dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ github.token }}
          tag_name: dev-build
          target_commitish: ${{ github.sha }}
          name: "AiNiee Dev Preview (Web + GUI)"
          prerelease: true
          make_latest: false
          files: |
            LaunchGUI.bat
            LaunchGUI.sh
          overwrite_files: true

  arch-linux-launcher-check:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install minimal tools
        run: pacman -Sy --noconfirm bash git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate launcher script syntax on Arch Linux
        run: bash -n LaunchGUI.sh
